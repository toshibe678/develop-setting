---
develop_setting_supported_windows_pattern: 'Windows 11'
develop_setting_supported_ubuntu_versions:
  - "24.04"
  - "26.04"

develop_setting_claude_install_url: "https://claude.ai/install.sh"
develop_setting_uv_install_url: "https://astral.sh/uv/install.sh"
develop_setting_pnpm_install_url: "https://get.pnpm.io/install.sh"
develop_setting_claude_sandbox_packages:
  - bubblewrap
  - libcap2-bin
  - libseccomp2
develop_setting_claude_update_cron_minute: "0"
develop_setting_claude_update_cron_hour: "4"

# Security scanning: semgrep + gitleaks via pre-commit
develop_setting_security_hooks_dir: "{{ ansible_env.HOME }}/.git-hooks"
develop_setting_security_precommit_config: "{{ ansible_env.HOME }}/.pre-commit-config.yaml"
develop_setting_gitleaks_rev: "v8.18.0"
develop_setting_semgrep_rev: "v1.68.0"

# Claude Code user-level configuration (~/.claude)
develop_setting_claude_config_dir: "{{ ansible_env.HOME }}/.claude"
develop_setting_claude_md_content: ""
develop_setting_claude_mcp_servers: {}
develop_setting_claude_settings_env: {}
develop_setting_claude_settings_permissions: {}
