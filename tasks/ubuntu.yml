---
# 対象Ubuntuバージョンかを事前検証し、想定外環境での実行を防ぐ
- name: Validate Ubuntu version
  ansible.builtin.assert:
    that:
      - ansible_distribution_version in develop_setting_supported_ubuntu_versions
    fail_msg: "This role supports Ubuntu 24.04 or 26.04 only."

# Claude Code実行に必要なサンドボックス関連パッケージを導入する
- name: Install Claude Code sandbox packages
  ansible.builtin.apt:
    name: "{{ develop_setting_claude_sandbox_packages }}"
    state: present
    update_cache: true
  become: true

# Claudeコマンドの存在を確認し、既存インストール有無を判定する
- name: Check if Claude Code is already installed
  ansible.builtin.command:
    cmd: which claude
  register: claude_which
  changed_when: false
  failed_when: false

# 未導入時のみ公式インストーラでClaude Codeをインストールする
- name: Install Claude Code via official install script
  ansible.builtin.shell:
    cmd: "curl -fsSL {{ develop_setting_claude_install_url }} | bash"
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
  when: claude_which.rc != 0
  changed_when: true

# Claude Codeを日次で更新するcronジョブをユーザー領域に設定する
- name: Set up daily Claude Code update cron job
  ansible.builtin.cron:
    name: "Update Claude Code"
    minute: "{{ develop_setting_claude_update_cron_minute }}"
    hour: "{{ develop_setting_claude_update_cron_hour }}"
    job: "curl -fsSL {{ develop_setting_claude_install_url }} | bash >> {{ ansible_env.HOME }}/claude-update.log 2>&1"
    user: "{{ ansible_user_id }}"
    state: present

# uvコマンドの有無を確認し、インストール要否を判定する
- name: Check if uv is already installed
  ansible.builtin.shell:
    cmd: "command -v uv"
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  register: uv_which
  changed_when: false
  failed_when: false

# 未導入時のみ公式インストーラでuvを導入する（リトライ付き）
- name: Install uv via official install script
  ansible.builtin.shell:
    cmd: "set -o pipefail && curl -fsSL {{ develop_setting_uv_install_url }} | sh"
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
  register: uv_install
  until: uv_install is succeeded
  retries: 3
  delay: 10
  when: uv_which.rc != 0
  changed_when: true

# pnpmコマンドの有無を確認し、インストール要否を判定する
- name: Check if pnpm is already installed
  ansible.builtin.shell:
    cmd: "command -v pnpm"
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.HOME }}/.local/share/pnpm:{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  register: pnpm_which
  changed_when: false
  failed_when: false

# 未導入時のみ公式インストーラでpnpmを導入する（リトライ付き）
- name: Install pnpm via official install script
  ansible.builtin.shell:
    cmd: "set -o pipefail && curl -fsSL {{ develop_setting_pnpm_install_url }} | sh -"
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
    SHELL: /bin/bash
  register: pnpm_install
  until: pnpm_install is succeeded
  retries: 3
  delay: 10
  when: pnpm_which.rc != 0
  changed_when: true

# ---- Supply chain attack countermeasures: package manager cooldown ----
# npm/pnpmの新規公開直後パッケージ利用を遅延させる設定を ~/.npmrc に適用する
- name: Configure .npmrc minimum-release-age for pnpm/npm (supply chain protection)
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.npmrc"
    regexp: '^minimum-release-age='
    line: "minimum-release-age={{ develop_setting_npm_minimum_release_age }}"
    create: true
    mode: '0644'

# uv設定ディレクトリを作成し、続く設定ファイル配置に備える
- name: Ensure uv config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/uv"
    state: directory
    mode: '0755'
  when: develop_setting_uv_exclude_newer != ""

# uvのexclude-newerを設定し、最新過ぎるパッケージの利用を抑制する
- name: Configure uv exclude-newer (supply chain protection)
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.config/uv/uv.toml"
    regexp: '^exclude-newer\s*='
    line: 'exclude-newer = "{{ develop_setting_uv_exclude_newer }}"'
    create: true
    mode: '0644'
  when: develop_setting_uv_exclude_newer != ""

# ---- Security scanning: semgrep + gitleaks via pre-commit ----
# pre-commit本体をユーザー領域に導入し、フック実行基盤を準備する
- name: Install pre-commit
  ansible.builtin.pip:
    name: pre-commit
    state: present
    extra_args: "--user"
  register: precommit_install
  until: precommit_install is succeeded
  retries: 3
  delay: 10

# グローバルGitフック用ディレクトリを作成する
- name: Ensure global git-hooks directory exists
  ansible.builtin.file:
    path: "{{ develop_setting_security_hooks_dir }}"
    state: directory
    mode: '0755'

# semgrep/gitleaksを実行するpre-commit設定ファイルを配備する
- name: Deploy global pre-commit config (semgrep + gitleaks)
  ansible.builtin.template:
    src: pre-commit-config.yaml.j2
    dest: "{{ develop_setting_security_precommit_config }}"
    mode: '0644'

# グローバルpre-commitフックスクリプトを配置する
- name: Deploy global pre-commit hook script
  ansible.builtin.copy:
    dest: "{{ develop_setting_security_hooks_dir }}/pre-commit"
    content: |
      #!/bin/sh
      exec pre-commit run --config "{{ develop_setting_security_precommit_config }}"
    mode: '0755'

# GitのhooksPathをグローバル設定し、全リポジトリで同一フックを有効化する
- name: Set global git core.hooksPath
  community.general.git_config:
    name: core.hooksPath
    value: "{{ develop_setting_security_hooks_dir }}"
    scope: global

# ---- Claude Code user-level configuration (~/.claude) ----
# ユーザー単位のClaude設定ディレクトリを作成する
- name: Ensure Claude Code user config directory exists
  ansible.builtin.file:
    path: "{{ develop_setting_claude_config_dir }}"
    state: directory
    mode: '0700'

# ユーザー共通のCLAUDE.mdをテンプレートから配置する
- name: Deploy user-level CLAUDE.md
  ansible.builtin.template:
    src: claude_CLAUDE.md.j2
    dest: "{{ develop_setting_claude_config_dir }}/CLAUDE.md"
    mode: '0644'

# MCP設定を含むsettings.jsonをテンプレートから配置する
- name: Deploy user-level Claude settings.json (includes MCP settings)
  ansible.builtin.template:
    src: claude_settings.json.j2
    dest: "{{ develop_setting_claude_config_dir }}/settings.json"
    mode: '0600'
