---
- name: Validate Windows 11 target
  ansible.builtin.assert:
    that:
      - ansible_distribution is search(develop_setting_supported_windows_pattern)
    fail_msg: "This role supports Windows 11 only."

# ---- Security scanning: semgrep + gitleaks via pre-commit ----
- name: Install pre-commit via pip (Windows)
  ansible.windows.win_shell: pip install --user pre-commit
  register: win_precommit_install
  until: win_precommit_install is succeeded
  retries: 3
  delay: 10
  changed_when: "'Successfully installed' in win_precommit_install.stdout"

- name: Ensure global git-hooks directory exists (Windows)
  ansible.windows.win_file:
    path: "{{ ansible_env.USERPROFILE }}\\.git-hooks"
    state: directory

- name: Deploy global pre-commit config (Windows)
  ansible.windows.win_template:
    src: pre-commit-config.yaml.j2
    dest: "{{ ansible_env.USERPROFILE }}\\.pre-commit-config.yaml"

- name: Deploy global pre-commit hook script (Windows)
  ansible.windows.win_copy:
    dest: "{{ ansible_env.USERPROFILE }}\\.git-hooks\\pre-commit"
    content: |
      #!/bin/sh
      exec pre-commit run --config "$HOME/.pre-commit-config.yaml"

- name: Set global git core.hooksPath (Windows)
  ansible.windows.win_shell: git config --global core.hooksPath "{{ ansible_env.USERPROFILE | replace('\\', '/') }}/.git-hooks"
  register: win_git_hooks
  changed_when: win_git_hooks.rc == 0

# ---- Claude Code user-level configuration (%USERPROFILE%\.claude) ----
- name: Ensure Claude Code user config directory exists (Windows)
  ansible.windows.win_file:
    path: "{{ ansible_env.USERPROFILE }}\\.claude"
    state: directory

- name: Deploy user-level CLAUDE.md (Windows)
  ansible.windows.win_template:
    src: claude_CLAUDE.md.j2
    dest: "{{ ansible_env.USERPROFILE }}\\.claude\\CLAUDE.md"

- name: Deploy user-level Claude settings.json (includes MCP settings) (Windows)
  ansible.windows.win_template:
    src: claude_settings.json.j2
    dest: "{{ ansible_env.USERPROFILE }}\\.claude\\settings.json"
